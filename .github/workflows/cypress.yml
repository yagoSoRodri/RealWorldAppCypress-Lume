name: Cypress RealWorld Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Rodar todos os dias às 09:00 BRT (12:00 UTC)
    - cron: '0 12 * * *'

jobs:
  install-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install

      - name: Static Analysis (Lint)
        run: yarn lint

      - name: Cache Build
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            build
            public
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Run Build
        if: steps.cache-build.outputs.cache-hit != 'true'
        run: yarn build

  cypress-run:
    needs: install-and-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Grupos de testes baseados em tags
        tags: ['@smoke', '@api', '@regression']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install

      - name: Restore Build
        uses: actions/cache@v4
        with:
          path: |
            build
            public
          key: ${{ runner.os }}-build-${{ github.sha }}

      - name: Cypress run
        uses: cypress-io/github-action@v6
        env:
          PORT: 3000
        with:
          install: false
          start: yarn start:ci
          wait-on: 'http://localhost:3000, http://localhost:3001'
          wait-on-timeout: 200
          browser: chrome
          env: grepTags=${{ matrix.tags }}

      - name: Upload Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-reports-${{ matrix.tags }}
          path: cypress/reports/

  publish-report:
    if: always()
    needs: cypress-run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install Dependencies
        run: yarn install

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: cypress/reports
          pattern: cypress-reports-*
          merge-multiple: true

      - name: Merge and Generate Final Report
        run: |
          mkdir -p cypress/reports

          # Mover JSONs de subpastas criadas pelo download-artifact para o diretorio raiz
          find cypress/reports -mindepth 2 -name '*.json' -exec mv {} cypress/reports/ \;

          # Remover combined-report.json de execucoes anteriores para evitar loop
          rm -f cypress/reports/combined-report.json

          # Validar cada JSON individualmente — remover corrompidos
          for f in cypress/reports/*.json; do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "⚠️ Removendo relatório corrompido: $f"
              rm -f "$f"
            fi
          done

          if ls cypress/reports/*.json 1> /dev/null 2>&1; then
            yarn report:merge
            yarn report:generate
          else
            echo "⚠️ Nenhum relatório JSON válido encontrado. Pulando a geração do HTML final."
          fi

      - name: Upload Final HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-report
          path: cypress/reports/html
